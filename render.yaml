version: "1"
services:
  - type: web
    name: tct-0.0.0
    runtime: docker
    plan: free
    region: virginia
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit

    envVars:
      - key: SESSION_ID
        sync: false
      - key: TIMEZONE
        sync: false
      - key: PREFIX
        sync: false
      - key: POSTGRES_URL
        sync: false
